name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (core + dev only — no private data or ingest deps needed)
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test (synthetic ground truth; no personal data)
        run: pytest -q
